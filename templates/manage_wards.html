{% extends 'base.html' %}
{% block title %}Manage Wards{% endblock %}
{% block page_title %}Manage Wards: {{ dept['name'] }}{% endblock %}
{% block content %}
<div class="card" style="margin-bottom:20px">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>New Ward Name *</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:10px">Add Ward</button>
    </form>
  </div>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Ward Name</th></tr></thead>
      <tbody>
        {% for w in wards %}
        <tr>
          <td>{{ w['name'] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
