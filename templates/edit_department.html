{% extends 'base.html' %}
{% block title %}Edit Department{% endblock %}
{% block page_title %}Edit Department{% endblock %}
{% block content %}
<div style="max-width:400px">
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label>Department Name *</label>
          <input type="text" name="name" class="form-control" value="{{ dept.name }}" required>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px">
          <a href="{{ url_for('department_list') }}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">Update Department</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
