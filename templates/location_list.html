{% extends 'base.html' %}
{% block title %}Locations{% endblock %}
{% block page_title %}Location Management{% endblock %}
{% block content %}
<div style="display:flex;justify-content:flex-end;margin-bottom:18px">
  <a href="{{ url_for('add_location') }}" class="btn btn-primary">+ Add Location</a>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Location</th><th></th></tr></thead>
      <tbody>
        {% for l in locations %}
        <tr>
          <td style="font-weight:600">{{ l['name'] }}</td>
          <td style="text-align:right">
            <a href="{{ url_for('edit_location', lid=l['id']) }}" class="btn btn-ghost btn-sm">Edit</a>
            <form method="POST" action="{{ url_for('delete_location', lid=l['id']) }}" style="display:inline" onsubmit="return confirm('Delete this location?')">
                <button type="submit" class="btn btn-ghost btn-sm" style="color:var(--danger)">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
