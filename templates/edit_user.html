{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-header"><h2>👤 Edit User: {{ user['username'] }}</h2></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-grid" style="grid-template-columns:1fr 1fr">
          <div class="form-group form-span-2">
            <label>Full Name *</label>
            <input type="text" name="full_name" class="form-control" value="{{ user['full_name'] }}" required>
          </div>
          <div class="form-group">
            <label>Role *</label>
            <select name="role" class="form-control" required>
              <option value="intern" {% if user['role'] == 'intern' %}selected{% endif %}>Intern</option>
              <option value="technician" {% if user['role'] == 'technician' %}selected{% endif %}>Technician</option>
              <option value="chief_engineer" {% if user['role'] == 'chief_engineer' %}selected{% endif %}>Chief Engineer</option>
            </select>
          </div>
          <div class="form-group form-span-2">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ user['email'] or '' }}">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px">
          <a href="{{ url_for('user_list') }}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">Update User</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
