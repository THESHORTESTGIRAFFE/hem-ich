{% extends 'base.html' %}
{% block title %}Register Equipment - Identity{% endblock %}
{% block page_title %}Register Equipment{% endblock %}

{% block content %}
<div style="margin-bottom:24px">
  <h2 style="font-size:1.1rem;font-weight:700">Step 1: Equipment Identity</h2>
  <p style="color:var(--text-muted);font-size:0.82rem;margin-top:3px">Enter the core identification details.</p>
</div>

<form method="POST" id="receive-form" class="card">
  <div class="card-header"><h2>🔬 Equipment Identity</h2></div>
  <div class="card-body" style="padding-top:28px">
    <div class="field-row single" style="margin-bottom:28px">
      <div class="field">
        <label>Equipment Name <span class="req">Required</span></label>
        <input type="text" name="name" id="f-name" class="fi" autofocus placeholder="e.g. Draeger Ventilator Pro X2000" required>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Manufacturer</label>
        <input type="text" name="manufacturer" class="fi" placeholder="e.g. Draeger">
      </div>
      <div class="field">
        <label>Model</label>
        <input type="text" name="model" class="fi" placeholder="e.g. VX-2000">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Serial Number</label>
        <input type="text" name="serial_number" class="fi" placeholder="Unique serial number">
      </div>
    </div>
  </div>
  <div class="card-footer" style="padding:16px; border-top:1px solid var(--border);">
    <button type="submit" class="btn btn-primary">Next: Provenance →</button>
  </div>
</form>
{% endblock %}
